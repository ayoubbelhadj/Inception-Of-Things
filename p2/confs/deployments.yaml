# Deployment for App 1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: app1
        image: paulbouwer/hello-kubernetes:1.10
        ports:
          - containerPort: 8080
        env:
          - name: MESSAGE
            value: "Hello from app1."
